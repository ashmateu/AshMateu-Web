<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Nota — Ash Mateu</title>
  <meta name="description" id="pageMeta" content="Notas editoriales de Ash Mateu.">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preload" href="/fonts/BebasNeue-Regular.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0A0A0A; --ivory: #F7F3EE; --white: #fff; --sand: #B5A898;
      --gutter: 56px; --serif: 'Playfair Display', Georgia, serif; --sans: 'Inter', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); font-weight: 300; color: var(--black); background: var(--ivory); -webkit-font-smoothing: antialiased; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 28px var(--gutter);
      background: rgba(247,243,238,0.96); backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(181,168,152,0.25);
    }
    .nav-logo { font-family: var(--sans); font-size: 11px; font-weight: 400; letter-spacing: 0.22em; text-transform: uppercase; color: var(--black); text-decoration: none; }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--black); text-decoration: none; opacity: 0.5; transition: opacity 0.2s; }
    .nav-links a:hover, .nav-links a.active { opacity: 1; }
    .nav-hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 4px; z-index: 201; }
    .nav-hamburger span { display: block; width: 22px; height: 1px; background: var(--black); transition: transform 0.25s, opacity 0.25s; }
    .nav-hamburger.is-open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .nav-hamburger.is-open span:nth-child(2) { opacity: 0; }
    .nav-hamburger.is-open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

    .post-hero {
      padding-top: 140px;
      padding-bottom: 0;
    }
    .post-hero-inner {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 var(--gutter) 64px;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--sand); text-decoration: none; margin-bottom: 48px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--black); }
    .post-date { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--sand); margin-bottom: 20px; }
    .post-title {
      font-family: var(--serif); font-size: clamp(36px, 5vw, 68px);
      font-weight: 400; line-height: 1.08; letter-spacing: -0.01em; margin-bottom: 28px;
    }
    .post-excerpt {
      font-size: 16px; font-weight: 300; line-height: 1.75;
      color: rgba(10,10,10,0.6); border-left: 2px solid var(--sand);
      padding-left: 24px; margin-bottom: 0;
    }

    .post-cover-full {
      width: 100%; height: 560px; overflow: hidden; margin-bottom: 0;
    }
    .post-cover-full img {
      width: 100%; height: 100%; object-fit: cover; object-position: top center; display: block;
      filter: brightness(0.88) contrast(1.06) saturate(0.78);
    }

    .post-body-wrap {
      max-width: 760px; margin: 0 auto; padding: 64px var(--gutter) 120px;
    }
    .post-body {
      font-size: 17px; font-weight: 300; line-height: 1.85; color: rgba(10,10,10,0.85);
    }
    .post-body h2 { font-family: var(--serif); font-size: 28px; font-weight: 400; margin: 48px 0 16px; }
    .post-body h3 { font-family: var(--serif); font-size: 22px; font-weight: 400; margin: 36px 0 12px; }
    .post-body p { margin-bottom: 24px; }
    .post-body p:last-child { margin-bottom: 0; }
    .post-body strong { font-weight: 500; }
    .post-body em { font-style: italic; }
    .post-body a { color: var(--black); text-decoration: underline; text-underline-offset: 3px; }
    .post-body blockquote {
      border-left: 2px solid var(--sand); padding-left: 24px; margin: 36px 0;
      font-family: var(--serif); font-size: 22px; font-style: italic;
      color: rgba(10,10,10,0.65); line-height: 1.5;
    }
    .post-body img { width: 100%; margin: 36px 0; }

    .post-footer { max-width: 760px; margin: 0 auto; padding: 0 var(--gutter) 80px; border-top: 1px solid rgba(10,10,10,0.08); padding-top: 40px; }
    .post-footer a { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--sand); text-decoration: none; }
    .post-footer a:hover { color: var(--black); }

    .not-found { text-align: center; padding: 200px var(--gutter); color: var(--sand); font-size: 13px; }

    footer { background: var(--black); border-top: 1px solid rgba(255,255,255,0.07); padding: 32px var(--gutter); display: flex; justify-content: space-between; align-items: center; }
    .footer-logo { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.35); }
    .footer-links { display: flex; gap: 36px; list-style: none; }
    .footer-links a { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.35); text-decoration: none; transition: color 0.2s; }
    .footer-links a:hover { color: var(--white); }
    .footer-copy { font-size: 10px; color: rgba(255,255,255,0.2); }

    @media (max-width: 900px) {
      :root { --gutter: 24px; }
      .nav-hamburger { display: flex; }
      .nav-links { position: fixed; inset: 0; background: var(--ivory); flex-direction: column; align-items: center; justify-content: center; gap: 44px; z-index: 200; display: none; }
      .nav-links.is-open { display: flex; }
      .nav-links a { font-size: 20px; letter-spacing: 0.2em; opacity: 0.75; }
      .post-hero { padding-top: 110px; }
    }
    @media (max-width: 560px) {
      footer { flex-direction: column; gap: 20px; text-align: center; }
    }
      @view-transition { navigation: auto; }
    </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Ash Mateu</a>
  <ul class="nav-links" id="navLinks">
    <li><a href="/#trabajo">Portfolio</a></li>
    <li><a href="/prensa.html">Prensa</a></li>
    <li><a href="/blog.html" class="active">Notas</a></li>
    <li><a href="/#vlog">Vlog</a></li>
    <li><a href="/mercadito.html" style="font-weight:500;opacity:0.75">Mercadito</a></li>
    <li><a href="/#contacto">Contacto</a></li>
  </ul>
  <button class="nav-hamburger" id="navHamburger" aria-label="Menú">
    <span></span><span></span><span></span>
  </button>
</nav>

<div id="postContent"></div>

<footer>
  <span class="footer-logo">Ash Mateu</span>
  <ul class="footer-links">
    <li><a href="https://instagram.com/ashmateu" target="_blank" rel="noopener">@ashmateu</a></li>
    <li><a href="/">Inicio</a></li>
    <li><a href="/blog.html">Notas</a></li>
  </ul>
  <span class="footer-copy">&copy; 2026</span>
</footer>

<script>
const SUPABASE_URL = 'https://jrxklahobxpxmtnncvst.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_8vdBzcFdNVhjtjK9a4ZE9A_FPmxsHhd';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const hamburger = document.getElementById('navHamburger');
const navLinks  = document.getElementById('navLinks');
hamburger.addEventListener('click', () => {
  const open = hamburger.classList.toggle('is-open');
  navLinks.classList.toggle('is-open', open);
});
navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
  hamburger.classList.remove('is-open');
  navLinks.classList.remove('is-open');
}));

function formatDate(d) {
  return new Date(d).toLocaleDateString('es-AR', { day:'2-digit', month:'long', year:'numeric' });
}

async function loadPost() {
  const slug = new URLSearchParams(location.search).get('slug');
  const container = document.getElementById('postContent');
  if (!slug) { container.innerHTML = '<div class="not-found">Nota no encontrada.</div>'; return; }

  const { data, error } = await sb.from('posts').select('*').eq('slug', slug).eq('active', true).single();

  if (error || !data) {
    container.innerHTML = '<div class="not-found">Esta nota no existe o no está publicada.</div>';
    return;
  }

  document.title = `${data.title} — Ash Mateu`;
  document.getElementById('pageMeta').content = data.excerpt ?? data.title;

  container.innerHTML = `
    <div class="post-hero">
      <div class="post-hero-inner">
        <a class="back-link" href="/blog.html">← Volver a notas</a>
        <p class="post-date">${formatDate(data.published_at)}</p>
        <h1 class="post-title">${data.title}</h1>
        ${data.excerpt ? `<p class="post-excerpt">${data.excerpt}</p>` : ''}
      </div>
    </div>
    ${data.cover_url ? `<div class="post-cover-full"><img src="${data.cover_url}" alt="${data.title}"></div>` : ''}
    <div class="post-body-wrap">
      <div class="post-body">${data.body ?? ''}</div>
    </div>
    <div class="post-footer">
      <a href="/blog.html">← Todas las notas</a>
    </div>
  `;
}

loadPost();
</script>
</body>
</html>
