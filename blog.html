<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notas — Ash Mateu</title>
  <meta name="description" content="Notas editoriales de Ash Mateu. Moda, estilo, behind the scenes.">
  <link rel="canonical" href="https://ashmateu.com/blog.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Notas — Ash Mateu">
  <meta property="og:url" content="https://ashmateu.com/blog.html">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0A0A0A; --ivory: #F7F3EE; --white: #fff; --sand: #B5A898;
      --gutter: 56px; --serif: 'Playfair Display', Georgia, serif; --sans: 'Inter', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); font-weight: 300; color: var(--black); background: var(--ivory); -webkit-font-smoothing: antialiased; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 28px var(--gutter);
      background: rgba(247,243,238,0.96); backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(181,168,152,0.25);
    }
    .nav-logo { font-family: var(--sans); font-size: 11px; font-weight: 400; letter-spacing: 0.22em; text-transform: uppercase; color: var(--black); text-decoration: none; }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a { font-size: 11px; font-weight: 400; letter-spacing: 0.16em; text-transform: uppercase; color: var(--black); text-decoration: none; opacity: 0.5; transition: opacity 0.2s; }
    .nav-links a:hover, .nav-links a.active { opacity: 1; }
    .nav-hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 4px; z-index: 201; }
    .nav-hamburger span { display: block; width: 22px; height: 1px; background: var(--black); transition: transform 0.25s, opacity 0.25s; }
    .nav-hamburger.is-open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .nav-hamburger.is-open span:nth-child(2) { opacity: 0; }
    .nav-hamburger.is-open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

    .blog-header {
      padding: 160px var(--gutter) 80px;
      border-bottom: 1px solid rgba(10,10,10,0.08);
    }
    .blog-header .eyebrow { font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--sand); margin-bottom: 24px; }
    .blog-header h1 { font-family: var(--serif); font-size: clamp(48px, 6vw, 88px); font-weight: 400; line-height: 1; letter-spacing: -0.01em; }
    .blog-header h1 em { font-style: italic; }

    .blog-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
    }

    .post-card {
      border-right: 1px solid rgba(10,10,10,0.08);
      border-bottom: 1px solid rgba(10,10,10,0.08);
      padding: 40px 40px 48px;
      text-decoration: none;
      color: var(--black);
      display: flex;
      flex-direction: column;
      transition: background 0.2s;
    }
    .post-card:nth-child(3n) { border-right: none; }
    .post-card:hover { background: rgba(10,10,10,0.02); }

    .post-cover {
      width: 100%; aspect-ratio: 16/9; overflow: hidden; margin-bottom: 28px;
      background: #1a1a1a;
    }
    .post-cover img { width: 100%; height: 100%; object-fit: cover; display: block; filter: brightness(0.88) contrast(1.06) saturate(0.78); transition: transform 0.5s ease; }
    .post-card:hover .post-cover img { transform: scale(1.03); }
    .post-cover-placeholder { width: 100%; height: 100%; background: #111; }

    .post-date { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--sand); margin-bottom: 12px; }
    .post-title { font-family: var(--serif); font-size: clamp(20px, 2vw, 26px); font-weight: 400; line-height: 1.25; margin-bottom: 12px; }
    .post-excerpt { font-size: 13px; font-weight: 300; line-height: 1.7; color: rgba(10,10,10,0.55); flex: 1; }
    .post-read { margin-top: 24px; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--black); opacity: 0.4; }

    .blog-empty { padding: 120px var(--gutter); text-align: center; color: var(--sand); font-size: 13px; }

    footer { background: var(--black); border-top: 1px solid rgba(255,255,255,0.07); padding: 32px var(--gutter); display: flex; justify-content: space-between; align-items: center; }
    .footer-logo { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.35); }
    .footer-links { display: flex; gap: 36px; list-style: none; }
    .footer-links a { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.35); text-decoration: none; transition: color 0.2s; }
    .footer-links a:hover { color: var(--white); }
    .footer-copy { font-size: 10px; color: rgba(255,255,255,0.2); letter-spacing: 0.1em; }

    @media (max-width: 900px) {
      :root { --gutter: 24px; }
      .nav-hamburger { display: flex; }
      .nav-links { position: fixed; inset: 0; background: var(--ivory); flex-direction: column; align-items: center; justify-content: center; gap: 44px; z-index: 200; display: none; }
      .nav-links.is-open { display: flex; }
      .nav-links a { font-size: 20px; letter-spacing: 0.2em; opacity: 0.75; }
      .blog-header { padding: 120px var(--gutter) 56px; }
      .blog-grid { grid-template-columns: repeat(2, 1fr); }
      .post-card { padding: 28px 24px 36px; }
      .post-card:nth-child(3n) { border-right: 1px solid rgba(10,10,10,0.08); }
      .post-card:nth-child(2n) { border-right: none; }
    }
    @media (max-width: 560px) {
      .blog-grid { grid-template-columns: 1fr; }
      .post-card { border-right: none; }
      .post-card:nth-child(2n) { border-right: none; }
      footer { flex-direction: column; gap: 20px; text-align: center; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Ash Mateu</a>
  <ul class="nav-links" id="navLinks">
    <li><a href="/#trabajo">Trabajo</a></li>
    <li><a href="/blog.html" class="active">Notas</a></li>
    <li><a href="/prensa.html">Prensa</a></li>
    <li><a href="/mercadito.html">Mercadito</a></li>
    <li><a href="/#vlog">Vlog</a></li>
    <li><a href="/#contacto">Contacto</a></li>
  </ul>
  <button class="nav-hamburger" id="navHamburger" aria-label="Menú">
    <span></span><span></span><span></span>
  </button>
</nav>

<header class="blog-header">
  <p class="eyebrow">Ash Mateu</p>
  <h1>Notas <em>editoriales</em></h1>
</header>

<main>
  <div class="blog-grid" id="blogGrid">
    <div class="blog-empty" style="grid-column:1/-1">Cargando...</div>
  </div>
</main>

<footer>
  <span class="footer-logo">Ash Mateu</span>
  <ul class="footer-links">
    <li><a href="https://instagram.com/ashmateu" target="_blank" rel="noopener">@ashmateu</a></li>
    <li><a href="/">Inicio</a></li>
    <li><a href="/#contacto">Contacto</a></li>
  </ul>
  <span class="footer-copy">&copy; 2026</span>
</footer>

<script>
const SUPABASE_URL = 'https://jrxklahobxpxmtnncvst.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_8vdBzcFdNVhjtjK9a4ZE9A_FPmxsHhd';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const hamburger = document.getElementById('navHamburger');
const navLinks  = document.getElementById('navLinks');
hamburger.addEventListener('click', () => {
  const open = hamburger.classList.toggle('is-open');
  navLinks.classList.toggle('is-open', open);
});
navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
  hamburger.classList.remove('is-open');
  navLinks.classList.remove('is-open');
}));

function formatDate(d) {
  return new Date(d).toLocaleDateString('es-AR', { day:'2-digit', month:'long', year:'numeric' });
}

async function loadPosts() {
  const grid = document.getElementById('blogGrid');
  const { data, error } = await sb.from('posts').select('*').eq('active', true).order('published_at', { ascending: false });
  if (error || !data?.length) {
    grid.innerHTML = '<div class="blog-empty" style="grid-column:1/-1">Las notas aparecen acá cuando Ash publique la primera.</div>';
    return;
  }
  grid.innerHTML = data.map(p => `
    <a class="post-card" href="/blog/post.html?slug=${p.slug}">
      <div class="post-cover">
        ${p.cover_url ? `<img src="${p.cover_url}" alt="${p.title}" loading="lazy">` : '<div class="post-cover-placeholder"></div>'}
      </div>
      <span class="post-date">${formatDate(p.published_at)}</span>
      <h2 class="post-title">${p.title}</h2>
      <p class="post-excerpt">${p.excerpt ?? ''}</p>
      <span class="post-read">Leer nota</span>
    </a>
  `).join('');
}

loadPosts();
</script>
</body>
</html>
