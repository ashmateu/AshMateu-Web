<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notas — Ash Mateu</title>
  <meta name="description" content="Notas editoriales de Ash Mateu. Moda, estilo, behind the scenes.">
  <link rel="canonical" href="https://ashmateu.com/blog.html">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Notas — Ash Mateu">
  <meta property="og:url" content="https://ashmateu.com/blog.html">
  <meta property="og:image" content="https://ashmateu.com/images/extracted/chanel-hc/img-005.jpg">
  <meta property="og:description" content="Notas editoriales de Ash Mateu. Moda, estilo, behind the scenes.">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://ashmateu.com/images/extracted/chanel-hc/img-005.jpg">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,300;0,6..96,400;0,6..96,500;1,6..96,300;1,6..96,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0A0A0A; --ivory: #F7F3EE; --white: #fff; --sand: #B5A898; --sand-text: #7A6A5A;
      --gutter: 56px; --serif: 'Bodoni Moda', Georgia, serif; --sans: 'Inter', system-ui, sans-serif;
      --gap: 3px;
    }
    @font-face { font-family: 'Bebas Neue'; src: url('/fonts/BebasNeue-Regular.ttf') format('truetype'); font-display: swap; }
    html { scroll-behavior: smooth; scrollbar-gutter: stable; }
    body { font-family: var(--sans); font-weight: 300; color: var(--black); background: var(--black); -webkit-font-smoothing: antialiased; }

    /* ── Nav ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 28px var(--gutter);
      transition: background 0.4s, color 0.4s;
    }
    nav.scrolled { background: rgba(247,243,238,0.96); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(181,168,152,0.25); }
    .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 18px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.7); text-decoration: none; transition: color 0.4s; }
    .nav-logo:hover { color: var(--white); }
    nav.scrolled .nav-logo { color: var(--black); }
    nav.scrolled .nav-logo:hover { color: var(--black); }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a { font-size: 11px; font-weight: 400; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.4); text-decoration: none; transition: color 0.4s; }
    .nav-links a:hover, .nav-links a.active { color: rgba(255,255,255,0.9); }
    nav.scrolled .nav-links a { color: var(--black); opacity: 0.55; }
    nav.scrolled .nav-links a:hover, nav.scrolled .nav-links a.active { opacity: 1; }
    .nav-hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 4px; z-index: 201; }
    .nav-hamburger span { display: block; width: 22px; height: 1px; background: var(--white); transition: transform 0.25s, opacity 0.25s; }
    nav.scrolled .nav-hamburger span { background: var(--black); }
    .nav-hamburger.is-open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .nav-hamburger.is-open span:nth-child(2) { opacity: 0; }
    .nav-hamburger.is-open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

    /* ── Hero header ── */
    .blog-hero {
      position: relative;
      height: 70vh;
      min-height: 480px;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
    }
    .blog-hero-bg {
      position: absolute; inset: 0; z-index: 0;
    }
    .blog-hero-bg img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center 20%; display: block;
      filter: brightness(0.45) contrast(1.1) saturate(0.6);
    }
    .blog-hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(10,10,10,0.85) 0%, rgba(10,10,10,0.1) 60%);
      z-index: 1;
    }
    .blog-hero-content {
      position: relative; z-index: 2;
      padding: 0 var(--gutter) 64px; width: 100%;
    }
    .blog-hero-content .eyebrow {
      font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase;
      color: var(--sand); margin-bottom: 20px;
    }
    .blog-hero-content h1 {
      font-family: var(--serif);
      font-size: clamp(56px, 8vw, 120px);
      font-weight: 400; line-height: 0.92; letter-spacing: -0.02em; color: var(--white);
    }
    .blog-hero-content h1 em { font-style: italic; color: rgba(181,168,152,0.85); }

    /* ── Grid ── */
    .blog-grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: var(--gap);
      /* foto de Ash de fondo: llena los huecos negros del collage */
      background: var(--black) url('/images/ash/bts-set.jpg') center/cover no-repeat;
      padding: var(--gap);
    }

    .post-card:first-child { grid-column: 1 / -1; }

    /* ── Card ── */
    .post-card {
      text-decoration: none; color: var(--black);
      display: flex; flex-direction: column;
      background: var(--ivory); overflow: hidden; transition: opacity 0.25s;
    }
    .post-card:hover { opacity: 0.93; }

    /* ── Collage ── */
    .post-collage {
      flex-shrink: 0;
      background: transparent; /* muestra el fondo del grid (foto Ash) si la imagen falla */
      display: grid; gap: var(--gap);
      grid-template-columns: 62% 1fr;
      grid-template-rows: 1fr 1fr;
      height: 380px;
    }
    .post-card:first-child .post-collage {
      height: 560px;
      grid-template-columns: 64% 1fr;
    }
    .collage-main {
      grid-column: 1; grid-row: 1 / 3;
      overflow: hidden;
    }
    .collage-crop { overflow: hidden; }

    .collage-main img, .collage-crop img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      filter: brightness(0.88) contrast(1.06) saturate(0.78);
      transition: transform 0.65s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .post-card:hover .collage-main img,
    .post-card:hover .collage-crop img { transform: scale(1.04); }

    .collage-placeholder {
      grid-row: 1 / 3; grid-column: 1 / -1; height: 380px;
    }
    .post-card:first-child .collage-placeholder { height: 560px; }

    /* ── Card body ── */
    .post-body { padding: 28px 32px 36px; flex: 1; display: flex; flex-direction: column; }
    .post-card:first-child .post-body { padding: 36px 48px 48px; }

    .post-date { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--sand-text); margin-bottom: 12px; }
    .post-title { font-family: var(--serif); font-size: clamp(18px, 1.8vw, 24px); font-weight: 400; line-height: 1.2; margin-bottom: 12px; }
    .post-card:first-child .post-title { font-size: clamp(26px, 2.8vw, 40px); }
    .post-excerpt { font-size: 13px; font-weight: 300; line-height: 1.7; color: rgba(10,10,10,0.5); flex: 1; max-width: 480px; }
    .post-read { margin-top: 20px; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--black); opacity: 0.35; }

    /* ── Empty ── */
    .blog-empty {
      grid-column: 1 / -1; padding: 120px var(--gutter);
      text-align: center; color: rgba(255,255,255,0.3); font-size: 13px; background: var(--black);
    }

    /* ── Footer ── */
    footer {
      background: var(--black); border-top: 1px solid rgba(255,255,255,0.07);
      padding: 32px var(--gutter); display: flex; justify-content: space-between; align-items: center;
    }
    .footer-logo { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.35); }
    .footer-links { display: flex; gap: 36px; list-style: none; }
    .footer-links a { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.35); text-decoration: none; transition: color 0.2s; }
    .footer-links a:hover { color: var(--white); }
    .footer-copy { font-size: 10px; color: rgba(255,255,255,0.2); letter-spacing: 0.1em; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      :root { --gutter: 24px; }
      .nav-hamburger { display: flex; }
      .nav-links {
        position: fixed; inset: 0; background: rgba(10,10,10,0.97);
        flex-direction: column; align-items: center; justify-content: center;
        gap: 44px; z-index: 200; display: none;
      }
      .nav-links.is-open { display: flex; }
      .nav-links a { font-size: 20px; letter-spacing: 0.2em; color: rgba(255,255,255,0.75); }
      .blog-grid { grid-template-columns: 1fr; }
      .post-card:first-child { grid-column: auto; }
      .post-collage { height: 280px; }
      .post-card:first-child .post-collage { height: 340px; }
      .post-body { padding: 24px 24px 32px; }
      .post-card:first-child .post-body { padding: 24px 24px 32px; }
    }
    @media (max-width: 560px) {
      .blog-hero { height: 55vh; }
      .post-collage { height: 240px; }
      .post-card:first-child .post-collage { height: 280px; }
      footer { flex-direction: column; gap: 20px; text-align: center; }
    }
  </style>
</head>
<body>

<nav id="nav">
  <a href="/" class="nav-logo">Ash Mateu</a>
  <ul class="nav-links" id="navLinks">
    <li><a href="/#trabajo" data-i18n="nav.work">Portfolio</a></li>
    <li><a href="/prensa" data-i18n="nav.press">Prensa</a></li>
    <li><a href="/blog" class="active" data-i18n="nav.notes">Notas</a></li>
    <li><a href="/#vlog" data-i18n="nav.vlog">Vlog</a></li>
    <li><a href="/mercadito" style="font-weight:500;opacity:0.75" data-i18n="nav.shop">Mercadito</a></li>
    <li><a href="/#contacto" data-i18n="nav.contact">Contacto</a></li>
  </ul>
  <button class="nav-hamburger" id="navHamburger" aria-label="Menú">
    <span></span><span></span><span></span>
  </button>
</nav>

<header class="blog-hero" id="blogHero">
  <div class="blog-hero-bg">
    <img src="/images/ash/bts-set.jpg" alt="Ash Mateu en set" loading="eager">
  </div>
  <div class="blog-hero-overlay"></div>
  <div class="blog-hero-content">
    <p class="eyebrow">Ash Mateu</p>
    <h1>Notas <em>editoriales</em></h1>
  </div>
</header>

<main>
  <div class="blog-grid" id="blogGrid">
    <div class="blog-empty">Cargando...</div>
  </div>
</main>

<footer>
  <span class="footer-logo">Ash Mateu</span>
  <ul class="footer-links">
    <li><a href="https://instagram.com/ashmateu" target="_blank" rel="noopener">@ashmateu</a></li>
    <li><a href="/">Inicio</a></li>
    <li><a href="/#contacto">Contacto</a></li>
  </ul>
  <span class="footer-copy">&copy; 2026</span>
</footer>

<script>
const SUPABASE_URL = 'https://jrxklahobxpxmtnncvst.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_8vdBzcFdNVhjtjK9a4ZE9A_FPmxsHhd';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const nav = document.getElementById('nav');
window.addEventListener('scroll', () => { nav.classList.toggle('scrolled', window.scrollY > 80); }, { passive: true });
const hamburger = document.getElementById('navHamburger');
const navLinks  = document.getElementById('navLinks');
hamburger.addEventListener('click', () => {
  const open = hamburger.classList.toggle('is-open');
  navLinks.classList.toggle('is-open', open);
});
navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
  hamburger.classList.remove('is-open');
  navLinks.classList.remove('is-open');
}));

function formatDate(d) {
  return new Date(d).toLocaleDateString('es-AR', { day:'2-digit', month:'long', year:'numeric' });
}

function collage(p, eager) {
  const u1 = p.cover_url, u2 = p.cover_url_2, u3 = p.cover_url_3;
  if (!u1) return '<div class="collage-placeholder"></div>';
  const load = eager ? 'eager' : 'lazy';
  return `
    <figure class="collage-main">
      <img src="${u1}" alt="${p.title}" loading="${load}">
    </figure>
    <figure class="collage-crop">
      <img src="${u2 || u1}" alt="" loading="lazy" style="object-position:center top">
    </figure>
    <figure class="collage-crop">
      <img src="${u3 || u1}" alt="" loading="lazy" style="object-position:center bottom">
    </figure>`;
}

async function loadPosts() {
  const grid = document.getElementById('blogGrid');

  const { data, error } = await sb.from('posts').select('*').eq('active', true).order('published_at', { ascending: false });

  if (error || !data?.length) {
    grid.innerHTML = '<div class="blog-empty">Las notas aparecen acá cuando Ash publique la primera.</div>';
    return;
  }

  grid.innerHTML = data.map((p, i) => `
    <a class="post-card" href="/blog/post.html?slug=${p.slug}">
      <div class="post-collage">
        ${collage(p, i === 0)}
      </div>
      <div class="post-body">
        <span class="post-date">${formatDate(p.published_at)}</span>
        <h2 class="post-title">${p.title}</h2>
        <p class="post-excerpt">${p.excerpt ?? ''}</p>
        <span class="post-read">Leer nota →</span>
      </div>
    </a>
  `).join('');
}

loadPosts();
</script>
<script src="/js/i18n.js"></script>
</body>
</html>
