<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada — Ash Mateu</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,300;0,6..96,400;1,6..96,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family: 'Bebas Neue'; src: url('/fonts/BebasNeue-Regular.ttf') format('truetype'); font-display: swap; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0A0A0A; --ivory: #F7F3EE; --sand: #B5A898;
      --gutter: 56px;
      --serif: 'Bodoni Moda', Georgia, serif;
      --sans: 'Inter', system-ui, sans-serif;
    }
    html { scrollbar-gutter: stable; }
    body { font-family: var(--sans); font-weight: 300; color: var(--black); background: var(--ivory); -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 28px var(--gutter);
      background: rgba(247,243,238,0.96); backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(181,168,152,0.25);
    }
    .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--black); text-decoration: none; }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--black); text-decoration: none; opacity: 0.5; transition: opacity 0.2s; }
    .nav-links a:hover { opacity: 1; }

    main {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: flex-start;
      padding: 140px var(--gutter) 80px;
    }
    .error-label {
      font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--sand); margin-bottom: 24px;
    }
    .error-title {
      font-family: var(--serif); font-size: clamp(52px, 8vw, 96px);
      font-weight: 400; line-height: 1.0; letter-spacing: -0.01em;
      color: var(--black); margin-bottom: 32px;
    }
    .error-title em { font-style: italic; color: var(--sand); }
    .error-desc {
      font-size: 15px; font-weight: 300; line-height: 1.75;
      color: rgba(10,10,10,0.55); max-width: 400px; margin-bottom: 48px;
    }
    .error-links { display: flex; gap: 32px; flex-wrap: wrap; }
    .btn-primary {
      font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
      background: var(--black); color: var(--ivory); text-decoration: none;
      padding: 14px 28px; transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.75; }
    .btn-secondary {
      font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--black); text-decoration: none; opacity: 0.45;
      display: flex; align-items: center; gap: 8px; transition: opacity 0.2s;
    }
    .btn-secondary:hover { opacity: 1; }

    footer { background: var(--black); padding: 24px var(--gutter); display: flex; justify-content: space-between; align-items: center; }
    .footer-logo { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.35); }
    .footer-copy { font-size: 10px; color: rgba(255,255,255,0.2); }

    @media (max-width: 600px) {
      :root { --gutter: 24px; }
      .nav-links { display: none; }
      footer { flex-direction: column; gap: 12px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Ash Mateu</a>
  <ul class="nav-links">
    <li><a href="/#trabajo">Portfolio</a></li>
    <li><a href="/prensa">Prensa</a></li>
    <li><a href="/blog">Notas</a></li>
    <li><a href="/mercadito">Mercadito</a></li>
    <li><a href="/#contacto">Contacto</a></li>
  </ul>
</nav>

<main>
  <span class="error-label">Error 404</span>
  <h1 class="error-title">Página<br><em>no encontrada</em>.</h1>
  <p class="error-desc">Esta dirección no existe o fue movida. Desde el inicio podés explorar el portfolio, prensa y notas.</p>
  <div class="error-links">
    <a href="/" class="btn-primary">Ir al inicio</a>
    <a href="/#trabajo" class="btn-secondary">← Ver portfolio</a>
  </div>
</main>

<footer>
  <span class="footer-logo">Ash Mateu</span>
  <span class="footer-copy">&copy; 2026</span>
</footer>

</body>
</html>
